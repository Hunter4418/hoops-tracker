<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Hoops Tracker</title>
<meta name="theme-color" content="#0f0f10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Hoops"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" href="icons/icon-192.png"/>
<style>
  :root{
    --bg:#0f0f10;
    --surface1:#18181a;
    --surface2:#202023;
    --border:#2c2c2f;
    --border-strong:#3a3a3e;
    --text-primary:#f2f2f0;
    --text-secondary:#a3a39c;
    --text-muted:#6f6f6a;
    --accent:#e0742a;
    --accent-text:#ffb27a;
    --danger:#e2504a;
    --danger-text:#ff8f8a;
    --radius:12px;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);}
  body{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    min-height:100vh;
    -webkit-user-select:none;
    user-select:none;
  }
  #app{max-width:480px;margin:0 auto;padding:0 16px 32px;min-height:100vh;}
  button{
    font-family:inherit;
    background:var(--surface2);
    color:var(--text-primary);
    border:0.5px solid var(--border-strong);
    border-radius:var(--radius);
    cursor:pointer;
    transition:transform 0.08s ease, background 0.15s ease;
  }
  button:active{transform:scale(0.97);background:var(--surface1);}
  input,textarea{
    font-family:inherit;
    background:var(--surface1);
    color:var(--text-primary);
    border:0.5px solid var(--border-strong);
    border-radius:var(--radius);
    padding:10px 12px;
    font-size:16px;
    outline:none;
  }
  input:focus,textarea:focus{border-color:var(--accent);}
  input::placeholder,textarea::placeholder{color:var(--text-muted);}
  .card{background:var(--surface1);border:0.5px solid var(--border);border-radius:var(--radius);}
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
